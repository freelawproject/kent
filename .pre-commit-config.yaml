repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
     - id: check-added-large-files
     - id: check-ast
     - id: check-json
     - id: check-merge-conflict
     - id: check-toml
     - id: check-yaml
     - id: debug-statements
     - id: detect-private-key
     - id: fix-byte-order-marker
     - id: fix-encoding-pragma
       args: [--remove]
     - id: trailing-whitespace
       args: [--markdown-linebreak-ext=md]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.8
    hooks:
      - id: ruff
        args: [ --fix ]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        additional_dependencies:
          - types-lxml

  - repo: local
    hooks:
      - id: pyre
        name: pyre
        # Run via uvx in an isolated env: pyre-check pins an older click, so
        # adding it to the project venv/uv.lock would downgrade click and break
        # the CLI tests. uvx keeps it out of the project environment entirely.
        # `uv sync` first because .pyre_configuration's search_path points at
        # the project venv's site-packages, which must exist for import
        # resolution (matters on a fresh CI checkout).
        entry: bash -c 'uv sync --quiet && uvx --from pyre-check==0.9.25 pyre check'
        language: system
        pass_filenames: false
        types: [python]
      - id: zuban
        name: zuban
        # Same isolation rationale as pyre: uvx keeps zuban out of the
        # project venv, and `uv sync` guarantees the venv's site-packages
        # exist for third-party import resolution on a fresh checkout.
        entry: bash -c 'uv sync --quiet && uvx zuban@0.8.2 check'
        language: system
        pass_filenames: false
        types: [python]
      - id: pytest
        name: pytest
        entry: uv run pytest -x -q -n auto
        language: system
        pass_filenames: false
        always_run: true
